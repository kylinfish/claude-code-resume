<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ccr logo">
  <defs>
    <linearGradient id="lbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23233a"/>
      <stop offset="1" stop-color="#14141d"/>
    </linearGradient>
    <linearGradient id="lword" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee0a0"/>
      <stop offset="1" stop-color="#5fd7af"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#lbg)" stroke="#33334d" stroke-width="3"/>

  <!-- prompt chevron + cursor -->
  <text x="256" y="262" text-anchor="middle" class="mono" font-size="180" font-weight="700">
    <tspan fill="#5fd7af">❯</tspan><tspan fill="#7ee0a0" dx="10">▋</tspan>
  </text>
  <!-- wordmark -->
  <text x="256" y="400" text-anchor="middle" class="mono" font-size="130" font-weight="700" fill="url(#lword)">ccr</text>
</svg>
