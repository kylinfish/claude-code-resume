<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ccr — Claude Code Resume">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1f1f30"/>
      <stop offset="1" stop-color="#15151f"/>
    </linearGradient>
    <linearGradient id="word" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7ee0a0"/>
      <stop offset="1" stop-color="#5fd7af"/>
    </linearGradient>
    <style>
      .mono { font-family: ui-monospace, "SF Mono", SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
    </style>
  </defs>

  <!-- terminal window -->
  <rect x="24" y="24" width="1152" height="372" rx="18" fill="url(#bg)" stroke="#2c2c40" stroke-width="1.5"/>

  <!-- title bar -->
  <circle cx="60"  cy="62" r="8" fill="#ff5f56"/>
  <circle cx="88"  cy="62" r="8" fill="#ffbd2e"/>
  <circle cx="116" cy="62" r="8" fill="#27c93f"/>
  <text x="600" y="67" text-anchor="middle" class="mono" font-size="18" fill="#5b5b70">~/.claude/projects — ccr</text>
  <line x1="24" y1="88" x2="1176" y2="88" stroke="#2c2c40" stroke-width="1.5"/>

  <!-- wordmark -->
  <text x="64" y="208" class="mono" font-size="120" font-weight="700">
    <tspan fill="#5fd7af">❯</tspan><tspan fill="url(#word)" dx="18">ccr</tspan><tspan fill="#7ee0a0" dx="6">▋</tspan>
  </text>

  <!-- subtitle + tagline -->
  <text x="70" y="262" class="mono" font-size="30" font-weight="600" fill="#dadada">Claude Code Resume</text>
  <text x="70" y="298" class="mono" font-size="20" fill="#9aa0b4">Browse every Claude Code session · preview · resume — even from your phone</text>

  <!-- sample list rows (echoes the real UI palette) -->
  <text x="70" y="344" class="mono" font-size="21" xml:space="preserve"><tspan fill="#5fd787">  just now </tspan><tspan fill="#585858">│ </tspan><tspan fill="#dadada">Add JWT auth to the API gateway   </tspan><tspan fill="#585858">│ </tspan><tspan fill="#87afd7">~/code/acme-api</tspan></text>
  <text x="70" y="372" class="mono" font-size="21" xml:space="preserve"><tspan fill="#d7af87">   1d ago  </tspan><tspan fill="#585858">│ </tspan><tspan fill="#dadada">Refactor the payment webhook      </tspan><tspan fill="#585858">│ </tspan><tspan fill="#87afd7">~/code/payments</tspan></text>
</svg>
